server {
    listen 80;
    server_name nav.yourdomain.com;
    # SSL 证书（宝塔申请后将此块取消注释）
    # listen 443 ssl;
    # ssl_certificate     /www/server/panel/vhost/cert/nav.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /www/server/panel/vhost/cert/nav.yourdomain.com/privkey.pem;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # 全部流量代理到 Express
    # Express 自行擐管：前台页、管理后台 SPA、API、图标上传
    location / {
        proxy_pass http://127.0.0.1:3721;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
    }

    # 安全：禁止访问隐藏文件和 SQLite 数据库
    location ~ /\. { deny all; }
    location ~ \.db$ { deny all; }
}
